input: |
  사용자가 Notion에 새 문서를 만들거나 기존 문서를 업데이트해 달라고 한다.

actual_output: |
  Search the database first, branch on duplicate results, ask the user before creating duplicates, and apply the supersession protocol when replacing a page.

expected_properties:
  - Search the database first
  - ask the user
  - supersession protocol

forbidden_patterns:
  - create duplicates silently

evaluation:
  judge_method: schema-check
  pass_threshold: 0.8

notes: |
  Prevents accidental duplicate Notion pages.

