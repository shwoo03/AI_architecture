id: case-001
skill: code-review-expert
created_at: 2026-05-02
last_verified_at: 2026-05-02
staleness_check_due: 2026-07-31

input: |
  Review a patch that changes validation behavior.

actual_output: |
  Lead with concrete bugs and regression risks, cite exact files or lines,
  then mention test gaps only after findings or explicitly say no issues found.

expected_properties:
  - Lead with concrete bugs and regression risks
  - cite exact files or lines
  - mention test gaps only after findings

forbidden_patterns:
  - looks good
  - "summary first"

evaluation:
  judge_method: "schema-check"
  pass_threshold: 1.0

notes: |
  Keeps review output focused on actionable findings.
