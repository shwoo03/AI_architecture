name: AI Architecture CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -v
      - name: Verify
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/verify.py
      - name: Quality gate
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/quality-gate.py --format json
