future_candidates:
  - command: scripts/agent-flow.py run --goal "<goal>"
    status: deferred
    reason: Full automatic execution needs more guardrails around approval, writes, and rollback.

specialist_agents:
  - name: build-error-resolver
    public: false
    routed_by: planner
    purpose: Minimal build, typecheck, and test failure fixes after implementation.
  - name: security-reviewer
    public: false
    routed_by: planner
    purpose: Review security-scan, permission, secret, and copied-source findings.
  - name: reference-reviewer
    public: false
    routed_by: planner
    purpose: Compare reference candidates and produce source-backed absorption notes.
  - name: docs-sync-auditor
    public: false
    routed_by: planner
    purpose: Check docs, catalog, codemap, and workflow drift.
  - name: closeout-validator
    public: false
    routed_by: planner
    purpose: Independently inspect verify, quality-gate, and completion evidence.
