id: case-001
skill: reference-refresher
created_at: 2026-05-02
last_verified_at: 2026-05-02
staleness_check_due: 2026-07-31

input: |
  Refresh tracked reference repositories.

actual_output: |
  Read references.yaml, compare latest commit to last_known_commit, summarize changed commits, produce review candidates, and update last_known_commit only after user confirmation.

expected_properties:
  - references.yaml
  - last_known_commit
  - user confirmation

forbidden_patterns:
  - automatically update references.yaml

evaluation:
  judge_method: "schema-check"
  pass_threshold: 0.8

notes: |
  Keeps reference refresh review-first.
